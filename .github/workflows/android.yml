name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt-get update
        # حل مشكلة الاعتمادات المكسورة (Broken Packages)
        sudo apt-get install -y --fix-broken
        # تثبيت المكتبة اللي كانت مسببة المشكلة يدوياً أولاً
        sudo apt-get install -y libunwind-dev
        
        # تثبيت باقي المكتبات مع تجاهل الأخطاء البسيطة
        sudo apt-get install -y \
            build-essential git python3-dev ffmpeg libsdl2-dev \
            libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev \
            libavcodec-dev zlib1g-dev libgstreamer1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            libsqlite3-dev sqlite3 bzip2 libbz2-dev libssl-dev \
            openssl libgdbm-dev libncursesw5-dev libreadline-dev \
            uuid-dev tk-dev libffi-dev liblzma-dev libtool \
            pkg-config autoconf automake libltdl-dev
        
        pip install --upgrade pip
        pip install --upgrade buildozer cython==0.29.33 sh

    - name: Build with Buildozer
      run: |
        buildozer android debug
      env:
        APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
        BUILDOZER_ALLOW_ORG_TEST_DOMAIN: "1"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Noser_App_Final
        path: bin/*.apk
